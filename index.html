<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAG</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 520px;
    text-align: center;
    background: #1b1b1b;
    border-radius: 20px;
    padding: 25px;
}

h1 { font-size: 3rem; }

input {
    width: 80%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

#loginBox { margin-bottom: 15px; }

.bar {
    width: 100%;
    height: 14px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.fill {
    height: 100%;
    width: 0%;
    background: lime;
    transition: 0.3s;
}

.board {
    text-align: left;
    margin-top: 10px;
    font-size: 14px;
}

#debug {
    margin-top: 10px;
    font-size: 12px;
    color: yellow;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>🌐 LAG</h1>

<div id="loginBox">
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

    <p>Logged in as: <span id="user"></span></p>

    <button onclick="runTest()">Start Test</button>
    <button onclick="logout()">Logout</button>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <div id="result"></div>

    <h3>🏆 Leaderboard</h3>
    <div id="board" class="board"></div>

</div>

<div id="debug"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCKDIEqDutPjTcMRQBfsH4sY",
  authDomain: "lag-crypto.firebaseapp.com",
  projectId: "lag-crypto",
  storageBucket: "lag-crypto.firebasestorage.app",
  messagingSenderId: "671955950297",
  appId: "1:671955950297:web:851dbe941e3a4f5a6bbcc8"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// 🧠 DEBUG LOGGER
function log(msg){
    console.log(msg);
    document.getElementById("debug").innerText += msg + "\n";
}

// 🔐 SIGN UP
function signup(){
    log("Signing up...");

    let email = emailInput();
    let pass = passInput();

    auth.createUserWithEmailAndPassword(email, pass)
    .then(() => log("Signup success"))
    .catch(e => log("Signup error: " + e.message));
}

// 🔐 LOGIN
function login(){
    log("Logging in...");

    let email = emailInput();
    let pass = passInput();

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => log("Login success"))
    .catch(e => log("Login error: " + e.message));
}

// 🔓 LOGOUT
function logout(){
    auth.signOut();
    log("Logged out");
}

// 👤 AUTH STATE
auth.onAuthStateChanged(user => {
    if(user){
        currentUser = user;
        log("User logged in: " + user.email);

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("user").innerText = user.email;

        loadBoard();
    } else {
        currentUser = null;
        log("User logged out");

        document.getElementById("loginBox").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
});

// 🎮 TEST
function runTest(){

    log("Test started");

    if(!currentUser){
        log("ERROR: not logged in");
        alert("Login first");
        return;
    }

    let score = Math.floor(Math.random()*100);

    document.getElementById("fill").style.width = score + "%";
    document.getElementById("result").innerHTML = "<h2>Score: " + score + "</h2>";

    log("Score: " + score);

    db.collection("leaderboard").add({
        uid: currentUser.uid,
        email: currentUser.email,
        score: score,
        time: Date.now()
    })
    .then(() => {
        log("WRITE SUCCESS ✅");
        loadBoard();
    })
    .catch(err => {
        log("WRITE ERROR ❌ " + err.message);
        alert(err.message);
    });
}

// 🏆 LEADERBOARD
function loadBoard(){

    log("Loading leaderboard...");

    db.collection("leaderboard")
    .orderBy("score","desc")
    .limit(10)
    .get()
    .then(snapshot => {

        let html = "";

        snapshot.forEach(doc => {
            let d = doc.data();
            html += `<div>${d.email} — ${d.score}</div>`;
        });

        document.getElementById("board").innerHTML = html;

        log("Leaderboard loaded");
    })
    .catch(err => {
        log("Leaderboard error: " + err.message);
    });
}

// helpers
function emailInput(){
    return document.getElementById("email").value;
}

function passInput(){
    return document.getElementById("password").value;
}

</script>

</body>
</html>
