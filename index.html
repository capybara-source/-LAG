<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LAG Wallet Login</title>

<style>
body {
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box {
    background:#1b1b1b;
    padding:20px;
    border-radius:15px;
    width:320px;
    text-align:center;
}

input {
    width:90%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    border:none;
}

button {
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.small { font-size:12px; color:gray; }
</style>
</head>

<body>

<div class="box">

<h2>🌐 LAG Wallet Login</h2>

<div id="login">
    <input id="wallet" placeholder="Enter wallet address (0x...)">
    <input id="name" placeholder="username">
    <button onclick="login()">Login / Create Account</button>
    <p class="small">No passwords. Wallet = identity</p>
</div>

<div id="app" style="display:none">

    <h3 id="welcome"></h3>

    <button onclick="runTest()">Run Lag Test</button>
    <button onclick="logout()">Logout</button>

    <h3 id="score"></h3>

</div>

</div>

<script>

let currentUser = null;

// fake DB (for now)
let db = JSON.parse(localStorage.getItem("lag_db") || "{}");

function saveDB(){
    localStorage.setItem("lag_db", JSON.stringify(db));
}

function login(){
    let wallet = document.getElementById("wallet").value;
    let name = document.getElementById("name").value;

    if(!wallet) return alert("Enter wallet");

    if(!db[wallet]){
        db[wallet] = {
            name: name || "anon",
            score: 0
        };
    }

    currentUser = wallet;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText =
        "Welcome " + db[wallet].name;

    saveDB();
}

function logout(){
    currentUser = null;
    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";
}

function runTest(){
    let score = Math.floor(Math.random()*100);

    db[currentUser].score = score;
    saveDB();

    document.getElementById("score").innerText =
        "Lag Score: " + score;
}

</script>

</body>
</html>
