<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAG</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 520px;
    text-align: center;
    background: #1b1b1b;
    border-radius: 20px;
    padding: 25px;
}

h1 { font-size: 3rem; }

input {
    width: 80%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

#loginBox { margin-bottom: 15px; }

.bar {
    width: 100%;
    height: 14px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.fill {
    height: 100%;
    width: 0%;
    background: lime;
    transition: 0.3s;
}

.board {
    text-align: left;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌐 LAG</h1>

<div id="loginBox">
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

    <p>Logged in as: <span id="user"></span></p>

    <button onclick="runTest()">Start Test</button>
    <button onclick="logout()">Logout</button>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <div id="result"></div>

    <h3>🏆 Leaderboard</h3>
    <div id="board" class="board"></div>

</div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 Firebase config (yours)
const firebaseConfig = {
  apiKey: "AIzaSyCKDIEqDutPjTcMRQBfsH4sY",
  authDomain: "lag-crypto.firebaseapp.com",
  projectId: "lag-crypto",
  storageBucket: "lag-crypto.firebasestorage.app",
  messagingSenderId: "671955950297",
  appId: "1:671955950297:web:851dbe941e3a4f5a6bbcc8"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// 🔐 SIGN UP
function signup(){
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
    .catch(e => alert(e.message));
}

// 🔐 LOGIN
function login(){
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .catch(e => alert(e.message));
}

// 🔓 LOGOUT
function logout(){
    auth.signOut();
}

// 👤 AUTH STATE
auth.onAuthStateChanged(user => {
    if(user){
        currentUser = user;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("user").innerText = user.email;
        loadBoard();
    } else {
        currentUser = null;
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
});

// 🎮 LAG TEST
function runTest(){

    let score = Math.floor(Math.random()*100);

    document.getElementById("fill").style.width = score + "%";

    document.getElementById("result").innerHTML =
        `<h2>Score: ${score}</h2>`;

    db.collection("leaderboard").add({
        uid: currentUser.uid,
        email: currentUser.email,
        score: score,
        time: Date.now()
    });

    loadBoard();
}

// 🏆 LOAD LEADERBOARD
function loadBoard(){

    db.collection("leaderboard")
    .orderBy("score","desc")
    .limit(10)
    .get()
    .then(snapshot => {

        let html = "";

        snapshot.forEach(doc => {
            let d = doc.data();
            html += `<div>${d.email} — ${d.score}</div>`;
        });

        document.getElementById("board").innerHTML = html;
    });
}

</script>

</body>
</html>
