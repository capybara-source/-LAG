<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LAG</title>

<!-- TAB ICON -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

<style>
:root {
  --bg:#0a0a0d;
  --card:#14141b;
  --text:#fff;
  --muted:#888;
  --border:#222;
  --accent:#5b5ef7;
}

.light {
  --bg:#f5f6ff;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
  --border:#ddd;
  --accent:#4b4fff;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

.app {
  max-width:700px;
  margin:0 auto;
  padding:40px 20px;
}

.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logo {
  font-weight:700;
  letter-spacing:2px;
}

button {
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  margin-top:15px;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
  color:var(--muted);
}

.small {
  color:var(--muted);
  font-size:12px;
}

#appUI { display:none; }

.toggle {
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
}
</style>
</head>

<body>

<div class="app">

<!-- TOP BAR -->
<div class="top">
  <div class="logo">⚡ LAG</div>

  <div>
    <button class="toggle" onclick="toggleTheme()">🌓</button>
    <button class="toggle" onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Create Account</h2>

    <input id="username" placeholder="username">
    <input id="wallet" placeholder="wallet address (0x...)">

    <button onclick="connectWallet()">Connect MetaMask</button>
    <button onclick="login()">Enter</button>

    <div class="small">Wallet required (manual or connect)</div>
  </div>
</div>

<!-- APP -->
<div id="appUI">

  <div class="card">
    <h2 id="hello"></h2>
    <div id="walletDisplay" class="small"></div>

    <button onclick="runTest()">Run Lag Test</button>
  </div>

  <div class="card">
    <h3>Stats</h3>
    <div class="row"><span>XP</span><span id="xp">0</span></div>
    <div class="row"><span>Level</span><span id="lvl">1</span></div>
    <div class="row"><span>Coins</span><span id="coins">0</span></div>
    <div class="row"><span>Wallet</span><span id="walletState">-</span></div>
  </div>

  <div class="card">
    <h3>Leaderboard</h3>
    <div id="board"></div>
  </div>

</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kkechuargolbljqkmmfw.supabase.co",
  "sb_publishable_2WcBHKhVZ_MMHahZbzWqZQ_l9_MkQh1"
);

let user = null;
let walletConnected = null;

/* THEME */
window.toggleTheme = function () {
  document.body.classList.toggle("light");
};

/* WALLET CONNECT */
window.connectWallet = async function () {
  if (window.ethereum) {
    const acc = await window.ethereum.request({ method: "eth_requestAccounts" });
    walletConnected = acc[0];
    alert("Connected: " + walletConnected);
  } else {
    alert("No wallet found");
  }
};

/* LOGIN (FIXED - now loads existing users) */
window.login = async function () {
  const username = document.getElementById("username").value.trim();
  const wallet = document.getElementById("wallet").value.trim() || walletConnected;

  if (!username) return;
  if (!wallet) return alert("Wallet required");

  // 🔍 CHECK EXISTING USER
  const { data: existing } = await supabase
    .from("lag_users")
    .select("*")
    .eq("wallet", wallet)
    .limit(1);

  if (existing && existing.length > 0) {
    user = existing[0];
  } else {
    const { data } = await supabase
      .from("lag_users")
      .insert([{ username, wallet }])
      .select();

    user = data[0];
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("appUI").style.display = "block";

  refresh();
};

/* TEST */
window.runTest = async function () {
  const score = Math.floor(Math.random() * 100);

  const xp = (user.xp || 0) + score;
  const coins = (user.lagcoins || 0) + Math.floor(score / 10);

  const { data } = await supabase
    .from("lag_users")
    .update({
      xp,
      lagcoins: coins,
      bestscore: Math.max(user.bestscore || 0, score)
    })
    .eq("id", user.id)
    .select();

  user = data[0];
  refresh();
};

/* UI */
function refresh() {
  document.getElementById("hello").innerText =
    "Welcome " + user.username;

  document.getElementById("xp").innerText = user.xp || 0;
  document.getElementById("lvl").innerText = Math.floor((user.xp || 0)/100)+1;
  document.getElementById("coins").innerText = user.lagcoins || 0;

  document.getElementById("walletState").innerText =
    user.wallet ? "Connected" : "None";

  document.getElementById("walletDisplay").innerText =
    user.wallet ? user.wallet.slice(0,6)+"..."+user.wallet.slice(-4) : "";

  loadLeaderboard();
}

/* LEADERBOARD */
async function loadLeaderboard() {
  const { data } = await supabase
    .from("lag_users")
    .select("*")
    .order("bestscore", { ascending:false })
    .limit(10);

  document.getElementById("board").innerHTML =
    data.map((u,i)=>`
      <div class="row">
        <span>${i+1}. ${u.username}</span>
        <span>${u.bestscore||0}</span>
      </div>
    `).join("");
}

/* LOGOUT */
window.logout = function () {
  location.reload();
};
</script>

</body>
</html>
