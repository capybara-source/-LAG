<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LAG</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

<style>
:root {
  --bg:#0a0a0d;
  --card:#14141b;
  --text:#fff;
  --muted:#888;
  --border:#222;
  --accent:#6c5ce7;
}

.light {
  --bg:#f5f6ff;
  --card:#fff;
  --text:#111;
  --muted:#555;
  --border:#ddd;
  --accent:#4b4fff;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container {
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-weight:800;
  letter-spacing:3px;
}

button {
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--accent);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-top:8px;
}

.secondary {
  background:transparent;
  color:var(--text);
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin-top:15px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg);
  color:var(--text);
}

#app { display:none; }

.row {
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid var(--border);
  color:var(--muted);
  font-size:14px;
}

.badge {
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(255,255,255,0.06);
  margin-bottom:8px;
  font-size:12px;
}

.small {
  color:var(--muted);
  font-size:12px;
}

.scan {
  position:relative;
  overflow:hidden;
}

.scan::after {
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
  animation:scan 1s infinite;
}

@keyframes scan {
  0% {left:-100%;}
  100% {left:100%;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">⚡ LAG</div>
  <div>
    <button class="secondary" onclick="toggleTheme()">🌓</button>
    <button class="secondary" onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="card">
  <h2>Enter LAG</h2>

  <input id="username" placeholder="username">
  <input id="wallet" placeholder="wallet address">

  <button onclick="login()">Continue</button>
</div>

<!-- APP -->
<div id="app">

  <div class="card">
    <h2 id="hello"></h2>
    <div id="walletDisplay" class="small"></div>

    <button id="testBtn" onclick="runTest()">Test My Lag</button>
    <button onclick="shareResult()">Share Result</button>

    <div id="result" style="margin-top:10px;"></div>
  </div>

  <div class="card">
    <h3>Leaderboard</h3>
    <div id="board"></div>
  </div>

</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kkechuargolbljqkmmfw.supabase.co",
  "sb_publishable_2WcBHKhVZ_MMHahZbzWqZQ_l9_MkQh1"
);

let user=null;
let lastResult=null;

/* LOGIN */
window.login = async function () {
  const username = document.getElementById("username").value.trim();
  const wallet = document.getElementById("wallet").value.trim();

  if (!username || !wallet) return;

  const { data: existing } = await supabase
    .from("lag_users")
    .select("*")
    .eq("wallet", wallet)
    .limit(1);

  if (existing.length) user = existing[0];
  else {
    const { data } = await supabase
      .from("lag_users")
      .insert([{ username, wallet }])
      .select();
    user = data[0];
  }

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  refresh();
};

/* LAG TEST */
window.runTest = async function () {
  const btn = document.getElementById("testBtn");
  btn.classList.add("scan");
  btn.innerText="Scanning...";

  const t0 = performance.now();
  await fetch("https://www.cloudflare.com/cdn-cgi/trace",{cache:"no-store"});
  const latency = performance.now()-t0;

  const t1 = performance.now();
  const res = await fetch("https://speed.cloudflare.com/__down?bytes=300000");
  const blob = await res.blob();
  const mbps = (blob.size*8)/((performance.now()-t1)/1000)/1_000_000;

  const score = Math.min(150, Math.max(5, (latency/5)+(20/(mbps+0.1))));

  let rarity="🟡 Normal";
  if(score>25) rarity="🟣 LEGENDARY LAG";
  else if(score>18) rarity="🔴 Dial-up Energy";
  else if(score>10) rarity="🟠 Laggy";
  else if(score>6) rarity="🟡 Normal";
  else rarity="🟢 Fast Fiber";

  lastResult = {score, latency, mbps, rarity};

  document.getElementById("result").innerHTML=`
    <div class="badge">${rarity}</div><br>
    ⚡ Score: <b>${score.toFixed(1)}</b><br>
    📶 Ping: ${latency.toFixed(0)}ms<br>
    🌐 Speed: ${mbps.toFixed(2)} Mbps
  `;

  btn.classList.remove("scan");
  btn.innerText="Test My Lag";

  refresh();
};

/* SHARE */
window.shareResult = async function () {
  if(!lastResult) return;

  const text =
`⚡ LAG TEST RESULT
${lastResult.rarity}

Score: ${lastResult.score.toFixed(1)}
Ping: ${lastResult.latency.toFixed(0)}ms
Speed: ${lastResult.mbps.toFixed(2)} Mbps

Wallet: ${user.wallet.slice(0,6)}...${user.wallet.slice(-4)}`;

  await navigator.clipboard.writeText(text);
  alert("Copied result card!");
};

/* UI */
function refresh(){
  document.getElementById("hello").innerText="Welcome "+user.username;
  document.getElementById("walletDisplay").innerText =
    "Wallet: "+user.wallet.slice(0,6)+"..."+user.wallet.slice(-4);

  loadLeaderboard();
}

/* LEADERBOARD */
async function loadLeaderboard(){
  const { data } = await supabase
    .from("lag_users")
    .select("*")
    .order("bestscore",{ascending:false})
    .limit(10);

  document.getElementById("board").innerHTML =
    data.map((u,i)=>`
      <div class="row">
        <span>${i+1}. ${u.username}</span>
        <span>${u.bestscore||0}</span>
      </div>
    `).join("");
}

/* THEME */
window.toggleTheme=()=>document.body.classList.toggle("light");

/* LOGOUT */
window.logout=()=>location.reload();
</script>

</body>
</html>
