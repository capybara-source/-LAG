<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAG</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 500px;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 85%;
    padding: 10px;
    margin: 6px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    padding: 10px 15px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.bar {
    width: 100%;
    height: 14px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.fill {
    height: 100%;
    width: 0%;
    background: lime;
    transition: 0.3s;
}

.small {
    font-size: 12px;
    color: gray;
}

#app { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>🌐 LAG</h1>

<!-- LOGIN -->
<div id="login">
    <input id="wallet" placeholder="Wallet address (0x...)">
    <input id="name" placeholder="username">
    <br>
    <button onclick="login()">Login / Create</button>
    <p class="small">No passwords — wallet = identity</p>
</div>

<!-- APP -->
<div id="app">

    <h3 id="welcome"></h3>

    <button onclick="runTest()">Run Lag Test</button>
    <button onclick="logout()">Logout</button>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <h2 id="score"></h2>

</div>

</div>

<script>

// fake database (stored in browser)
let db = JSON.parse(localStorage.getItem("LAG_DB") || "{}");
let currentWallet = null;

function save(){
    localStorage.setItem("LAG_DB", JSON.stringify(db));
}

function login(){
    let wallet = document.getElementById("wallet").value.trim();
    let name = document.getElementById("name").value.trim();

    if(!wallet){
        alert("Enter wallet address");
        return;
    }

    if(!db[wallet]){
        db[wallet] = {
            name: name || "anon",
            score: 0
        };
    }

    currentWallet = wallet;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText =
        "Welcome " + db[wallet].name;

    save();
}

function logout(){
    currentWallet = null;
    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";
}

function runTest(){
    if(!currentWallet) return;

    let score = Math.floor(Math.random() * 100);

    db[currentWallet].score = score;
    save();

    document.getElementById("fill").style.width = score + "%";
    document.getElementById("score").innerText =
        "Lag Score: " + score;
}

</script>

</body>
</html>
