<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAG</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0a0a0d;
  color:#fff;
}

.app {
  max-width:700px;
  margin:0 auto;
  padding:40px 20px;
}

.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logo {
  font-weight:600;
  letter-spacing:2px;
}

button {
  padding:10px 12px;
  border-radius:10px;
  border:0;
  background:#5b5ef7;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #222;
  background:#111116;
  color:#fff;
}

.card {
  background:#14141b;
  border:1px solid #222;
  border-radius:14px;
  padding:18px;
  margin-top:15px;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
  color:#ccc;
}

.small {
  color:#888;
  font-size:12px;
}

#appUI { display:none; }
</style>
</head>

<body>

<div class="app">

<div class="top">
  <div class="logo">LAG</div>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Create Account</h2>

    <input id="username" placeholder="username">
    <input id="wallet" placeholder="wallet address (0x...)">

    <button onclick="connectWallet()">Connect MetaMask</button>
    <button onclick="login()">Enter</button>

    <div class="small">Wallet required (manual or connect)</div>
  </div>
</div>

<!-- APP -->
<div id="appUI">

  <div class="card">
    <h2 id="hello"></h2>
    <div id="walletDisplay" class="small"></div>

    <button onclick="verifyWallet()">Verify Wallet</button>
    <button onclick="runTest()">Run Lag Test</button>
  </div>

  <div class="card">
    <h3>Stats</h3>
    <div class="row"><span>XP</span><span id="xp">0</span></div>
    <div class="row"><span>Level</span><span id="lvl">1</span></div>
    <div class="row"><span>Coins</span><span id="coins">0</span></div>
    <div class="row"><span>Wallet Verified</span><span id="verified">No</span></div>
  </div>

  <div class="card">
    <h3>Leaderboard</h3>
    <div id="board"></div>
  </div>

</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://kkechuargolbljqkmmfw.supabase.co",
  "sb_publishable_2WcBHKhVZ_MMHahZbzWqZQ_l9_MkQh1"
);

let user = null;
let walletConnected = null;

/* CONNECT WALLET */
window.connectWallet = async function () {
  if (window.ethereum) {
    const acc = await window.ethereum.request({ method: "eth_requestAccounts" });
    walletConnected = acc[0];
    alert("Connected: " + walletConnected);
  } else {
    alert("No wallet found");
  }
};

/* LOGIN */
window.login = async function () {
  const username = document.getElementById("username").value.trim();
  const wallet = document.getElementById("wallet").value.trim() || walletConnected;

  if (!username) return;
  if (!wallet) return alert("Wallet required");

  const { data } = await supabase
    .from("lag_users")
    .insert([{ username, wallet }])
    .select();

  user = data[0];

  document.getElementById("login").style.display = "none";
  document.getElementById("appUI").style.display = "block";

  refresh();
};

/* VERIFY WALLET */
window.verifyWallet = async function () {
  if (!user.wallet) return alert("No wallet");

  const { data } = await supabase
    .from("lag_users")
    .update({ wallet: user.wallet })
    .eq("id", user.id)
    .select();

  user = data[0];
  refresh();
};

/* TEST */
window.runTest = async function () {
  const score = Math.floor(Math.random() * 100);

  const xp = (user.xp || 0) + score;
  const coins = (user.lagcoins || 0) + Math.floor(score / 10);

  const { data } = await supabase
    .from("lag_users")
    .update({
      xp,
      lagcoins: coins,
      bestscore: Math.max(user.bestscore || 0, score)
    })
    .eq("id", user.id)
    .select();

  user = data[0];
  refresh();
};

/* UI */
function refresh() {
  document.getElementById("hello").innerText =
    "Welcome " + user.username;

  document.getElementById("xp").innerText = user.xp || 0;
  document.getElementById("lvl").innerText = Math.floor((user.xp || 0)/100)+1;
  document.getElementById("coins").innerText = user.lagcoins || 0;

  document.getElementById("verified").innerText =
    user.wallet ? "Yes" : "No";

  document.getElementById("walletDisplay").innerText =
    "Wallet: " + (user.wallet
      ? user.wallet.slice(0,6) + "..." + user.wallet.slice(-4)
      : "None");

  loadLeaderboard();
}

/* LEADERBOARD */
async function loadLeaderboard() {
  const { data } = await supabase
    .from("lag_users")
    .select("*")
    .order("bestscore", { ascending:false })
    .limit(10);

  document.getElementById("board").innerHTML =
    data.map((u,i)=>`
      <div class="row">
        <span>${i+1}. ${u.username}</span>
        <span>${u.bestscore||0}</span>
      </div>
    `).join("");
}
</script>

</body>
</html>
